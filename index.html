<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, minimum-scale=0.5">
  <title>云川市人物网 · 地区与人物志 (搜索+永久存储)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #f3f9e3;
      font-family: 'Segoe UI', 'Roboto', 'Noto Sans', 'Helvetica Neue', system-ui, sans-serif;
      color: #2e3b2c;
      line-height: 1.5;
      padding: 2rem 1.5rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .main-container {
      max-width: 1400px;
      width: 100%;
      background: rgba(255, 250, 240, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 3rem 3rem 2.5rem 2.5rem;
      box-shadow: 0 25px 45px rgba(120, 140, 100, 0.25);
      padding: 2.2rem 2.5rem;
      border: 1px solid rgba(180, 200, 160, 0.5);
    }

    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      background: #fefadc;
      border-radius: 5rem;
      padding: 0.8rem 2rem;
      box-shadow: 0 10px 20px rgba(150, 160, 100, 0.2);
      border: 1px solid #e6e7b0;
      gap: 1rem;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #7da06e, #b5c99a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
    }
    .nav-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .nav-btn {
      background: transparent;
      border: none;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 0.4rem 1.2rem;
      border-radius: 3rem;
      cursor: pointer;
      transition: all 0.25s ease;
      color: #4a5b3a;
      background: rgba(255, 255, 220, 0.7);
      box-shadow: 0 4px 8px rgba(130, 140, 90, 0.15);
    }
    .nav-btn:hover {
      background: #f7f7c8;
      transform: translateY(-2px);
    }
    .nav-btn.active {
      background: #cbe5b1;
      color: #2c4720;
      border: 1px solid #9bb87f;
    }
    /* 搜索框区域 */
    .search-area {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #ffffffcc;
      padding: 0.3rem 1rem;
      border-radius: 3rem;
      backdrop-filter: blur(4px);
    }
    .search-area input {
      border: none;
      background: transparent;
      padding: 0.5rem 0.8rem;
      font-size: 0.9rem;
      min-width: 180px;
      outline: none;
      font-family: inherit;
    }
    .search-area button {
      background: #cbe5b1;
      border: none;
      border-radius: 2rem;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }
    .search-area button:hover {
      background: #b0d48a;
    }
    /* 搜索浮层/下拉结果 */
    .search-results-dropdown {
      position: absolute;
      background: white;
      border-radius: 1.5rem;
      box-shadow: 0 12px 28px rgba(0,0,0,0.2);
      max-width: 320px;
      width: 100%;
      z-index: 200;
      margin-top: 0.5rem;
      border: 1px solid #ddd8b0;
      overflow: hidden;
    }
    .search-result-item {
      padding: 0.7rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid #f0eecd;
      transition: 0.1s;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .search-result-item:hover {
      background: #faf5cf;
    }
    .result-icon {
      font-size: 1.2rem;
    }
    .result-info {
      flex:1;
    }
    .result-title {
      font-weight: 700;
      color: #2d4a1e;
    }
    .result-sub {
      font-size: 0.7rem;
      color: #7f6b4a;
    }

    .dashboard {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
      margin-top: 1rem;
    }
    .card {
      background: #ffffffdd;
      backdrop-filter: blur(16px);
      border-radius: 2.5rem;
      padding: 1.8rem;
      box-shadow: 0 15px 30px rgba(110, 130, 80, 0.2);
      transition: 0.2s;
      border: 1px solid rgba(200, 210, 160, 0.7);
    }
    .region-card {
      background: #e3f2fd;
      border: 1px solid #b0d4f0;
    }
    .character-card {
      background: #ffe9f0;
      border: 1px solid #f7c9d6;
    }
    .section-title {
      font-size: 1.7rem;
      font-weight: 650;
      margin-bottom: 1.4rem;
      padding-bottom: 0.5rem;
      border-bottom: 3px dashed;
    }
    .region-title {
      color: #2c5f7c;
      border-bottom-color: #9bc2d9;
    }
    .character-title {
      color: #9e4b66;
      border-bottom-color: #f4b6c2;
    }
    .breadcrumb {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1.2rem;
      font-size: 0.9rem;
      background: #ffffffb3;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
    }
    .breadcrumb button {
      background: none;
      border: none;
      color: #2f5436;
      font-weight: 600;
      text-decoration: underline;
      cursor: pointer;
    }
    .region-images {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 1rem 0;
    }
    .region-img-item {
      width: 100px;
      height: 100px;
      background: #cbddec;
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background-size: cover;
      background-position: center;
      border: 2px solid #fff;
      box-shadow: 0 6px 12px rgba(0,0,0,0.1);
      position: relative;
    }
    .add-btn, .edit-btn, .delete-btn {
      background: white;
      border: 1px solid #aaa;
      border-radius: 2rem;
      padding: 0.3rem 1rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .entity-list {
      list-style: none;
      margin-top: 0.5rem;
    }
    .entity-list li {
      padding: 0.5rem 0.7rem;
      margin: 0.3rem 0;
      border-radius: 1.2rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,240,0.7);
    }
    .character-link {
      color: #b84c6b;
      font-weight: 600;
      text-decoration: underline;
      cursor: pointer;
      background: none;
      border: none;
    }
    textarea, input[type="text"] {
      width: 100%;
      padding: 0.6rem;
      border-radius: 1rem;
      border: 1px solid #ccd8b0;
      background: #fffff2;
    }
    .flex-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    hr {
      margin: 1rem 0;
      border: 1px solid #d4ddbc;
    }
    .storage-status {
      font-size: 0.7rem;
      background: #eef3e6;
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 2rem;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
  </style>
</head>
<body>
<div class="main-container">
  <header class="site-header">
    <div class="logo">🌸 云川市人物网 <span class="storage-status">💾 永久存储</span></div>
    <div class="search-area" style="position: relative;">
      <input type="text" id="globalSearchInput" placeholder="🔍 搜人物 / 作品 / 地区..." autocomplete="off">
      <button id="globalSearchBtn">搜索</button>
      <div id="searchDropdown" style="position: absolute; top: 100%; left: 0; right: 0; display: none;" class="search-results-dropdown"></div>
    </div>
    <div class="nav-links">
      <button id="navRegionBtn" class="nav-btn active">🏞️ 地区规划</button>
      <button id="navCharacterBtn" class="nav-btn">👥 云川人物</button>
    </div>
  </header>
  <div class="dashboard" id="dashboardContainer"></div>
</div>

<script>
  (function() {
    const STORAGE_KEY = 'YunChuan_World_Data_V2';

    const DEFAULT_REGION_DATA = {
      name: "云川市",
      description: "云川市整体规划 · 点击下方各区查看详情。可上传多张图片展示风貌。",
      images: [],
      districts: [
        { name: "云栖区", description: "东部的生态居住区，保留大量湿地公园。" },
        { name: "川流区", description: "商业中心与交通枢纽，高楼林立。" },
        { name: "望山新区", description: "新兴科技产业园区，依山而建。" }
      ]
    };

    const DEFAULT_CHARACTER_DATA = {
      works: [
        {
          name: "作品·星海纪",
          factions: [
            { name: "辉月联盟", characters: [{ name: "洛青", description: "联盟指挥官，冷静睿智。曾与【苏晚】共事。", image: "" }, { name: "苏晚", description: "神秘研究者，与【洛青】有旧交。", image: "" }] },
            { name: "暗蚀议会", characters: [{ name: "夜岚", description: "议会发言人，行事果决。", image: "" }] }
          ]
        }
      ]
    };

    let regionData = JSON.parse(JSON.stringify(DEFAULT_REGION_DATA));
    let characterData = JSON.parse(JSON.stringify(DEFAULT_CHARACTER_DATA));
    let currentView = 'region';
    let regionStack = [];
    let characterStack = { workIndex: null, factionIndex: null, characterIndex: null };

    // 持久化
    function persistAllData() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ regionData, characterData, version: '2.0' }));
        console.log('[云川] 已保存');
      } catch(e) { console.warn(e); }
    }

    function loadFromLocalStorage() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try {
          const saved = JSON.parse(raw);
          if (saved.regionData && saved.characterData) {
            regionData = saved.regionData;
            characterData = saved.characterData;
            if (!regionData.images) regionData.images = [];
            if (!regionData.districts) regionData.districts = [];
            if (!characterData.works) characterData.works = [];
            return;
          }
        } catch(e) {}
      }
      regionData = JSON.parse(JSON.stringify(DEFAULT_REGION_DATA));
      characterData = JSON.parse(JSON.stringify(DEFAULT_CHARACTER_DATA));
      persistAllData();
    }

    function commitAndRender() {
      persistAllData();
      renderAll();
    }

    // 全局搜索逻辑 (搜人物、作品、势力、地区)
    function searchAll(query) {
      if (!query.trim()) return [];
      const q = query.trim().toLowerCase();
      const results = [];

      // 1. 人物搜索 (作品>势力>人物)
      characterData.works.forEach((work, wIdx) => {
        work.factions.forEach((faction, fIdx) => {
          faction.characters.forEach((char, cIdx) => {
            if (char.name.toLowerCase().includes(q) || (char.description && char.description.toLowerCase().includes(q))) {
              results.push({
                type: 'character',
                title: char.name,
                subtitle: `📖 ${work.name} · ${faction.name}`,
                icon: '👤',
                jump: () => {
                  characterStack = { workIndex: wIdx, factionIndex: fIdx, characterIndex: cIdx };
                  currentView = 'character';
                  updateNavActive();
                  renderAll();
                }
              });
            }
          });
        });
      });

      // 2. 势力搜索
      characterData.works.forEach((work, wIdx) => {
        work.factions.forEach((faction, fIdx) => {
          if (faction.name.toLowerCase().includes(q)) {
            results.push({
              type: 'faction',
              title: faction.name,
              subtitle: `⚔️ 出自《${work.name}》`,
              icon: '🏠',
              jump: () => {
                characterStack = { workIndex: wIdx, factionIndex: fIdx, characterIndex: null };
                currentView = 'character';
                updateNavActive();
                renderAll();
              }
            });
          }
        });
      });

      // 3. 作品搜索
      characterData.works.forEach((work, wIdx) => {
        if (work.name.toLowerCase().includes(q)) {
          results.push({
            type: 'work',
            title: work.name,
            subtitle: `📚 包含 ${work.factions.length} 个势力`,
            icon: '📖',
            jump: () => {
              characterStack = { workIndex: wIdx, factionIndex: null, characterIndex: null };
              currentView = 'character';
              updateNavActive();
              renderAll();
            }
          });
        }
      });

      // 4. 地区搜索 (辖区)
      regionData.districts.forEach((district, idx) => {
        if (district.name.toLowerCase().includes(q) || (district.description && district.description.toLowerCase().includes(q))) {
          results.push({
            type: 'district',
            title: district.name,
            subtitle: `🏙️ 云川市辖区 · ${district.description?.slice(0, 30) || '点击查看'}`,
            icon: '🏘️',
            jump: () => {
              currentView = 'region';
              resetRegionStack();
              regionStack.push({ type: 'district', index: idx });
              updateNavActive();
              renderAll();
            }
          });
        }
      });
      // 城市本身
      if (regionData.name.toLowerCase().includes(q) || regionData.description.toLowerCase().includes(q)) {
        results.push({
          type: 'city',
          title: regionData.name,
          subtitle: '🌆 城市总览',
          icon: '🏙️',
          jump: () => {
            currentView = 'region';
            resetRegionStack();
            updateNavActive();
            renderAll();
          }
        });
      }
      return results.slice(0, 15);
    }

    function updateNavActive() {
      document.getElementById('navRegionBtn').classList.toggle('active', currentView === 'region');
      document.getElementById('navCharacterBtn').classList.toggle('active', currentView === 'character');
    }

    function renderSearchDropdown(query) {
      const dropdown = document.getElementById('searchDropdown');
      if (!query.trim()) {
        dropdown.style.display = 'none';
        return;
      }
      const results = searchAll(query);
      if (results.length === 0) {
        dropdown.innerHTML = '<div class="search-result-item" style="justify-content:center; color:gray;">😢 未找到相关条目</div>';
        dropdown.style.display = 'block';
        return;
      }
      dropdown.innerHTML = results.map(res => `
        <div class="search-result-item" data-search-jump='${encodeURIComponent(JSON.stringify({ type: res.type, title: res.title }))}'>
          <div class="result-icon">${res.icon}</div>
          <div class="result-info">
            <div class="result-title">${escapeHtml(res.title)}</div>
            <div class="result-sub">${escapeHtml(res.subtitle)}</div>
          </div>
        </div>
      `).join('');
      dropdown.style.display = 'block';
      // 绑定点击事件
      Array.from(dropdown.children).forEach((child, idx) => {
        child.addEventListener('click', () => {
          if (results[idx] && results[idx].jump) results[idx].jump();
          dropdown.style.display = 'none';
          document.getElementById('globalSearchInput').value = '';
        });
      });
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // ----- 渲染逻辑 (保持原有完整功能) -----
    function renderAll() {
      const container = document.getElementById('dashboardContainer');
      if (!container) return;
      if (currentView === 'region') container.innerHTML = renderRegionPanel();
      else container.innerHTML = renderCharacterPanel();
      attachEvents();
    }

    function resetRegionStack() { regionStack = [{ type: 'city' }]; }
    function resetCharacterStack() { characterStack = { workIndex: null, factionIndex: null, characterIndex: null }; }
    function getCurrentRegionLevel() { if (regionStack.length === 0) resetRegionStack(); return regionStack[regionStack.length-1]; }

    function renderImageList(images, context) {
      if (!images?.length) return `<div class="region-img-item img-placeholder">📷 暂无图片</div>`;
      return images.map((url, i) => `<div class="region-img-item" style="background-image:url('${escapeHtml(url)}'); background-size: cover;"><button class="delete-btn" data-delete-img="${context}" data-img-index="${i}" style="position:absolute; top:4px; right:4px;">✕</button></div>`).join('');
    }

    function renderRegionPanel() {
      const level = getCurrentRegionLevel();
      if (level.type === 'city') {
        return `<div class="card region-card"><div class="breadcrumb"><span>🏙️ 云川市</span></div>
          <h2 class="section-title region-title">🌿 ${escapeHtml(regionData.name)}</h2>
          <textarea id="cityDescText" rows="2">${escapeHtml(regionData.description || '')}</textarea>
          <button class="add-btn" id="saveCityDescBtn">💾 保存全市描述</button>
          <div class="region-images" id="cityImageContainer">${renderImageList(regionData.images, 'city')}</div>
          <div class="flex-row"><button class="add-btn" id="addCityImageBtn">➕ 添加图片</button><input type="file" id="cityImageInput" accept="image/*" multiple style="display:none;"></div><hr>
          <h3>📌 下辖各区</h3><ul class="entity-list" id="districtList">${regionData.districts.map((d, idx) => `<li data-district-index="${idx}"><span>🏘️ ${escapeHtml(d.name)}</span><div><button class="edit-btn edit-district-btn" data-index="${idx}">✏️</button><button class="delete-btn delete-district-btn" data-index="${idx}">🗑️</button></div></li>`).join('')}</ul>
          <button class="add-btn" id="addDistrictBtn">➕ 新增辖区</button></div>`;
      } else {
        const idx = level.index;
        const district = regionData.districts[idx];
        if (!district) { resetRegionStack(); return renderRegionPanel(); }
        return `<div class="card region-card"><div class="breadcrumb"><button class="back-to-city-btn">☁️ 云川市</button> <span>/</span> <span>${escapeHtml(district.name)}</span></div>
          <h2 class="section-title region-title">🏡 ${escapeHtml(district.name)}</h2>
          <textarea id="districtDescText" rows="4">${escapeHtml(district.description || '')}</textarea>
          <button class="add-btn" id="saveDistrictDescBtn">💾 保存介绍</button></div>`;
      }
    }

    function renderCharacterPanel() {
      const ctx = characterStack;
      if (ctx.workIndex === null) {
        return `<div class="card character-card"><h2 class="section-title character-title">📚 作品列表</h2><ul class="entity-list" id="workList">${characterData.works.map((w,i)=>`<li data-work-index="${i}"><span>📖 ${escapeHtml(w.name)}</span><div><button class="edit-btn edit-work-btn" data-index="${i}">✏️</button><button class="delete-btn delete-work-btn" data-index="${i}">🗑️</button></div></li>`).join('')}</ul><button class="add-btn" id="addWorkBtn">➕ 新增作品</button></div>`;
      } else if (ctx.workIndex !== null && ctx.factionIndex === null) {
        const work = characterData.works[ctx.workIndex];
        if (!work) { resetCharacterStack(); return renderCharacterPanel(); }
        return `<div class="card character-card"><div class="breadcrumb"><button class="back-to-works-btn">📚 作品</button><span>/</span><span>${escapeHtml(work.name)}</span></div><ul class="entity-list" id="factionList">${work.factions.map((f,i)=>`<li data-faction-index="${i}"><span>🏠 ${escapeHtml(f.name)}</span><div><button class="edit-btn edit-faction-btn" data-index="${i}">✏️</button><button class="delete-btn delete-faction-btn" data-index="${i}">🗑️</button></div></li>`).join('')}</ul><button class="add-btn" id="addFactionBtn">➕ 新增势力</button></div>`;
      } else if (ctx.workIndex !== null && ctx.factionIndex !== null && ctx.characterIndex === null) {
        const work = characterData.works[ctx.workIndex];
        const faction = work?.factions[ctx.factionIndex];
        if (!faction) { characterStack.factionIndex = null; return renderCharacterPanel(); }
        return `<div class="card character-card"><div class="breadcrumb"><button class="back-to-works-btn">📚</button><span>/</span><button class="back-to-factions-btn">${escapeHtml(work.name)}</button><span>/</span><span>${escapeHtml(faction.name)}</span></div><h3>👤 人物列表</h3><ul class="entity-list" id="characterList">${faction.characters.map((ch,i)=>`<li data-character-index="${i}"><span>${escapeHtml(ch.name)}</span><button class="edit-btn edit-character-btn" data-index="${i}">✏️</button><button class="delete-btn delete-character-btn" data-index="${i}">🗑️</button></li>`).join('')}</ul><button class="add-btn" id="addCharacterBtn">➕ 新增人物</button></div>`;
      } else {
        const work = characterData.works[ctx.workIndex];
        const faction = work?.factions[ctx.factionIndex];
        const character = faction?.characters[ctx.characterIndex];
        if (!character) { characterStack.characterIndex = null; return renderCharacterPanel(); }
        return `<div class="card character-card"><div class="breadcrumb"><button class="back-to-works-btn">📚</button>/<button class="back-to-factions-btn">${escapeHtml(work.name)}</button>/<button class="back-to-characters-btn">${escapeHtml(faction.name)}</button>/<span>${escapeHtml(character.name)}</span></div>
          <h2>✨ ${escapeHtml(character.name)}</h2><div class="flex-row"><label>人物图片：</label><input type="file" id="charImageInput" accept="image/*"><button class="add-btn" id="uploadCharImageBtn">上传</button>${character.image ? `<button class="delete-btn" id="removeCharImageBtn">移除图片</button>` : ''}</div>
          ${character.image ? `<img src="${escapeHtml(character.image)}" style="max-width:180px; border-radius:1rem;">` : '<p>暂无图片</p>'}
          <textarea id="charDescText" rows="5">${escapeHtml(character.description || '')}</textarea>
          <button class="add-btn" id="saveCharDescBtn">保存介绍</button>
          <div id="characterLinksPreview" style="margin-top:0.8rem;"></div></div>`;
      }
    }

    function attachEvents() {
      // 导航
      document.getElementById('navRegionBtn')?.addEventListener('click',()=>{ currentView='region'; resetRegionStack(); updateNavActive(); renderAll(); });
      document.getElementById('navCharacterBtn')?.addEventListener('click',()=>{ currentView='character'; resetCharacterStack(); updateNavActive(); renderAll(); });
      // 搜索相关
      const searchInput = document.getElementById('globalSearchInput');
      const searchBtn = document.getElementById('globalSearchBtn');
      const closeSearch = () => { setTimeout(()=>{ const d=document.getElementById('searchDropdown'); if(d) d.style.display='none'; }, 150); };
      searchInput?.addEventListener('input', (e) => renderSearchDropdown(e.target.value));
      searchBtn?.addEventListener('click', () => renderSearchDropdown(searchInput.value));
      document.addEventListener('click', (e) => { if(!e.target.closest('.search-area')) document.getElementById('searchDropdown').style.display = 'none'; });
      
      if (currentView === 'region') {
        document.getElementById('saveCityDescBtn')?.addEventListener('click',()=>{ regionData.description=document.getElementById('cityDescText')?.value; commitAndRender(); });
        document.querySelector('.back-to-city-btn')?.addEventListener('click',()=>{ resetRegionStack(); renderAll(); });
        document.querySelectorAll('#districtList li').forEach(li=>{ li.addEventListener('click',(e)=>{ if(e.target.tagName!=='BUTTON'){ const idx=li.dataset.districtIndex; if(idx!==undefined){ regionStack.push({type:'district',index:parseInt(idx)}); renderAll(); } } }); });
        document.querySelectorAll('.edit-district-btn').forEach(btn=>{ btn.addEventListener('click',(e)=>{ e.stopPropagation(); const idx=parseInt(btn.dataset.index); const newName=prompt('修改辖区名称',regionData.districts[idx]?.name); if(newName?.trim()){ regionData.districts[idx].name=newName.trim(); commitAndRender(); } else renderAll(); }); });
        document.querySelectorAll('.delete-district-btn').forEach(btn=>{ btn.addEventListener('click',(e)=>{ e.stopPropagation(); const idx=parseInt(btn.dataset.index); if(confirm('删除辖区？')){ regionData.districts.splice(idx,1); commitAndRender(); } }); });
        document.getElementById('addDistrictBtn')?.addEventListener('click',()=>{ const name=prompt('辖区名称'); if(name){ regionData.districts.push({name,description:''}); commitAndRender(); } });
        document.getElementById('addCityImageBtn')?.addEventListener('click',()=>document.getElementById('cityImageInput').click());
        document.getElementById('cityImageInput')?.addEventListener('change',(e)=>{ Array.from(e.target.files).forEach(f=>{ const reader=new FileReader(); reader.onload=ev=>{ regionData.images.push(ev.target.result); commitAndRender(); }; reader.readAsDataURL(f); }); });
        document.querySelectorAll('[data-delete-img="city"]')?.forEach(btn=>{ btn.addEventListener('click',(e)=>{ e.stopPropagation(); const idx=parseInt(btn.dataset.imgIndex); regionData.images.splice(idx,1); commitAndRender(); }); });
        document.getElementById('saveDistrictDescBtn')?.addEventListener('click',()=>{ const idx=getCurrentRegionLevel().index; const desc=document.getElementById('districtDescText')?.value; if(idx!==undefined && desc!==undefined){ regionData.districts[idx].description=desc; commitAndRender(); } });
      }
      if (currentView === 'character') {
        const ctx = characterStack;
        document.querySelector('.back-to-works-btn')?.addEventListener('click',()=>{ resetCharacterStack(); renderAll(); });
        document.querySelector('.back-to-factions-btn')?.addEventListener('click',()=>{ characterStack.factionIndex=null; characterStack.characterIndex=null; renderAll(); });
        document.querySelector('.back-to-characters-btn')?.addEventListener('click',()=>{ characterStack.characterIndex=null; renderAll(); });
        document.querySelectorAll('#workList li').forEach(li=>{ li.addEventListener('click',(e)=>{ if(e.target.tagName!=='BUTTON'){ characterStack={workIndex:parseInt(li.dataset.workIndex), factionIndex:null, characterIndex:null}; renderAll(); } }); });
        document.querySelectorAll('#factionList li').forEach(li=>{ li.addEventListener('click',()=>{ characterStack.factionIndex=parseInt(li.dataset.factionIndex); characterStack.characterIndex=null; renderAll(); }); });
        document.querySelectorAll('#characterList li').forEach(li=>{ li.addEventListener('click',()=>{ characterStack.characterIndex=parseInt(li.dataset.characterIndex); renderAll(); }); });
        document.getElementById('addWorkBtn')?.addEventListener('click',()=>{ const name=prompt('作品名称'); if(name){ characterData.works.push({name,factions:[]}); commitAndRender(); } });
        document.querySelectorAll('.edit-work-btn').forEach(b=>{ b.addEventListener('click',(e)=>{ e.stopPropagation(); const idx=parseInt(b.dataset.index); const n=prompt('新名称',characterData.works[idx].name); if(n){ characterData.works[idx].name=n; commitAndRender(); } }); });
        document.querySelectorAll('.delete-work-btn').forEach(b=>{ b.addEventListener('click',(e)=>{ e.stopPropagation(); if(confirm('删除作品？')){ characterData.works.splice(parseInt(b.dataset.index),1); resetCharacterStack(); commitAndRender(); } }); });
        document.getElementById('addFactionBtn')?.addEventListener('click',()=>{ const name=prompt('势力名称'); if(name && ctx.workIndex!==null){ characterData.works[ctx.workIndex].factions.push({name,characters:[]}); commitAndRender(); } });
        document.querySelectorAll('.edit-faction-btn').forEach(b=>{ b.addEventListener('click',(e)=>{ e.stopPropagation(); const n=prompt('新势力名'); if(n && ctx.workIndex!==null){ characterData.works[ctx.workIndex].factions[parseInt(b.dataset.index)].name=n; commitAndRender(); } }); });
        document.querySelectorAll('.delete-faction-btn').forEach(b=>{ b.addEventListener('click',(e)=>{ e.stopPropagation(); if(confirm('删除势力？') && ctx.workIndex!==null){ characterData.works[ctx.workIndex].factions.splice(parseInt(b.dataset.index),1); characterStack.factionIndex=null; commitAndRender(); } }); });
        document.getElementById('addCharacterBtn')?.addEventListener('click',()=>{ const name=prompt('人物姓名'); if(name && ctx.workIndex!==null && ctx.factionIndex!==null){ characterData.works[ctx.workIndex].factions[ctx.factionIndex].characters.push({name,description:'',image:''}); commitAndRender(); } });
        document.querySelectorAll('.edit-character-btn').forEach(b=>{ b.addEventListener('click',(e)=>{ e.stopPropagation(); const n=prompt('新姓名'); if(n && ctx.workIndex!==null && ctx.factionIndex!==null){ characterData.works[ctx.workIndex].factions[ctx.factionIndex].characters[parseInt(b.dataset.index)].name=n; commitAndRender(); } }); });
        document.querySelectorAll('.delete-character-btn').forEach(b=>{ b.addEventListener('click',(e)=>{ e.stopPropagation(); if(confirm('删除人物？') && ctx.workIndex!==null && ctx.factionIndex!==null){ characterData.works[ctx.workIndex].factions[ctx.factionIndex].characters.splice(parseInt(b.dataset.index),1); characterStack.characterIndex=null; commitAndRender(); } }); });
        document.getElementById('saveCharDescBtn')?.addEventListener('click',()=>{ const desc=document.getElementById('charDescText')?.value; if(ctx.workIndex!==null && ctx.factionIndex!==null && ctx.characterIndex!==null){ characterData.works[ctx.workIndex].factions[ctx.factionIndex].characters[ctx.characterIndex].description=desc; commitAndRender(); } });
        document.getElementById('uploadCharImageBtn')?.addEventListener('click',()=>document.getElementById('charImageInput').click());
        document.getElementById('charImageInput')?.addEventListener('change',(e)=>{ const file=e.target.files[0]; if(file && ctx.workIndex!==null && ctx.factionIndex!==null && ctx.characterIndex!==null){ const reader=new FileReader(); reader.onload=ev=>{ characterData.works[ctx.workIndex].factions[ctx.factionIndex].characters[ctx.characterIndex].image=ev.target.result; commitAndRender(); }; reader.readAsDataURL(file); } });
        document.getElementById('removeCharImageBtn')?.addEventListener('click',()=>{ if(ctx.workIndex!==null && ctx.factionIndex!==null && ctx.characterIndex!==null){ characterData.works[ctx.workIndex].factions[ctx.factionIndex].characters[ctx.characterIndex].image=''; commitAndRender(); } });
        const previewDiv=document.getElementById('characterLinksPreview');
        if(previewDiv && ctx.workIndex!==null && ctx.factionIndex!==null && ctx.characterIndex!==null){
          const char=characterData.works[ctx.workIndex]?.factions[ctx.factionIndex]?.characters[ctx.characterIndex];
          if(char){
            const linked=char.description?.replace(/【(.+?)】/g, (m,name)=>`<button class="character-link" data-character-name="${escapeHtml(name)}">${m}</button>`)||'';
            previewDiv.innerHTML=`🔗 ${linked}`;
            previewDiv.querySelectorAll('.character-link').forEach(btn=>{ btn.addEventListener('click',()=>{ const name=btn.dataset.characterName; for(let w=0;w<characterData.works.length;w++) for(let f=0;f<characterData.works[w].factions.length;f++) for(let c=0;c<characterData.works[w].factions[f].characters.length;c++) if(characterData.works[w].factions[f].characters[c].name===name){ characterStack={workIndex:w,factionIndex:f,characterIndex:c}; currentView='character'; updateNavActive(); renderAll(); return; } alert(`未找到「${name}」`); }); });
          }
        }
      }
    }

    loadFromLocalStorage();
    resetRegionStack();
    renderAll();
  })();
</script>
</body>
</html>
